# ~/.tmux.conf — terminal copy / scrollback / history behavior.

# Mouse support: scroll the wheel to enter copy-mode and page through history,
# click to select panes/windows, and drag to select text into the tmux buffer.
set -g mouse on

# Scrollback buffer size (lines kept per pane). Default is 2000; 50k is roomy.
set -g history-limit 50000

# --- Notes ----------------------------------------------------------------
# With `mouse on`, a normal drag selects into tmux's own buffer rather than the
# terminal's. To use your terminal's native selection/copy (e.g. to grab text
# across panes), hold SHIFT while dragging.
#
# Optional niceties you may want (left commented — uncomment to taste):
#   setw -g mode-keys vi                 # vi-style keys in copy-mode
#   set -g set-clipboard on              # let tmux write the system clipboard (OSC 52)
#   bind -T copy-mode-vi y send -X copy-selection-and-cancel
